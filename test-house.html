<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SHPUK — Test House Builder (модульная система)</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #1a1a1a; color: #ddd; overflow: hidden; }
#viewport { position: fixed; inset: 0; }

#panel {
  position: fixed; top: 12px; right: 12px; width: 340px;
  background: rgba(20,20,20,.92); padding: 16px; border-radius: 10px;
  font-size: 13px; max-height: calc(100vh - 24px); overflow-y: auto;
  border: 1px solid #333;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
#panel h2 { margin: 0 0 12px; font-size: 15px; font-weight: 600; letter-spacing: .02em; }
#panel h3 { margin: 18px 0 8px; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .06em; }
.row { margin-bottom: 12px; }
.row label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 12px; color: #aaa; }
.row label .v { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; }
.row input[type=range] { width: 100%; accent-color: #5b9; }
.row select { width: 100%; padding: 6px 8px; background: #2a2a2a; color: #ddd; border: 1px solid #444; border-radius: 4px; font-size: 13px; }
.row .opt { display: inline-flex; align-items: center; gap: 6px; color: #aaa; font-size: 12px; }
.row .opt input { accent-color: #5b9; }

button {
  background: #2a7a55; color: #fff; border: 0;
  padding: 8px 14px; border-radius: 5px; cursor: pointer;
  font-size: 13px; font-weight: 600; letter-spacing: .03em;
}
button:hover { background: #3b9268; }
button:disabled { background: #444; cursor: wait; }

.material-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
.material-row .lbl { flex: 1; font-size: 12px; color: #ccc; }
.material-row input[type=color] { width: 32px; height: 24px; border: 1px solid #444; padding: 0; cursor: pointer; background: transparent; border-radius: 3px; }
.material-row .reset {
  background: #444; color: #aaa; border: 0;
  padding: 2px 6px; border-radius: 3px; cursor: pointer; font-size: 10px;
}
.material-row .reset:hover { background: #555; color: #fff; }

#log {
  margin-top: 14px; background: #0a0a0a; padding: 8px 10px; border-radius: 4px;
  font-family: 'JetBrains Mono', Consolas, monospace; font-size: 10px;
  max-height: 220px; overflow-y: auto; line-height: 1.45;
  border: 1px solid #2a2a2a;
}
#log .err  { color: #ff6b6b; }
#log .warn { color: #ffb74d; }
#log .ok   { color: #7ed957; }
#log .dim  { color: #666; }

.hint {
  position: fixed; bottom: 12px; left: 12px;
  font-size: 11px; color: #888; background: rgba(0,0,0,.55);
  padding: 6px 10px; border-radius: 4px; pointer-events: none;
}
</style>
</head>
<body>
<div id="viewport"></div>

<div id="panel">
  <h2>SHPUK · Test House Builder</h2>

  <div class="row">
    <label>Тип дома</label>
    <select id="houseTypeSel">
      <option value="type_01">type_01 — Одноэтажный (вальмовая крыша)</option>
      <option value="type_02">type_02 — Одноэтажный (двускатная крыша)</option>
      <option value="type_03">type_03 — Г-образный (вальмовая крыша)</option>
      <option value="type_04">type_04 — Крестообразный (вальмовая крыша)</option>
      <option value="type_05">type_05 — Т-образный (вальмовая крыша)</option>
      <option value="type_06">type_06 — S/Z-образный (плоская крыша) [архив]</option>
      <option value="type_07">type_07 — П-образный (плоская крыша) [архив]</option>
      <option value="type_08">type_08 — О-образный с двором (плоская крыша) [архив]</option>
      <option value="type_09">type_09 — Двухэтажный (двускатная)</option>
      <option value="type_10">type_10 — 1.5-этажный (мансарда)</option>
      <option value="type_11">type_11 — Полутораэтажный (gable + dormer)</option>
      <option value="type_12">type_12 — Стеклянный (плоская крыша)</option>
    </select>
  </div>

  <h3>Параметры</h3>

  <div class="row">
    <label>Площадь, м²<span class="v" id="vArea">80</span></label>
    <input type="range" id="area" value="80" min="40" max="100" step="5">
  </div>

  <div class="row">
    <label>Высота этажа, см<span class="v" id="vFloor">300</span></label>
    <input type="range" id="floorH" value="300" min="270" max="330" step="10">
  </div>

  <div class="row">
    <label>Высота фундамента, см<span class="v" id="vBase">70</span></label>
    <input type="range" id="baseH" value="70" min="50" max="120" step="10">
  </div>

  <div class="row">
    <button id="rebuildBtn">⟳ Перестроить</button>
    <label class="opt" style="margin-left:10px;"><input type="checkbox" id="showOutline"> Контур</label>
    <label class="opt" style="margin-left:10px;"><input type="checkbox" id="showAxes"> Оси</label>
  </div>

  <h3>Материалы (override mat_*)</h3>
  <div id="materialControls"></div>

  <h3>Лог</h3>
  <div id="log"></div>
</div>

<div class="hint">ЛКМ — вращение · ПКМ — pan · Колесо — зум</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="shared/house-builder.js?v=55"></script>
<script src="test-house.js?v=49"></script>
</body>
</html>
